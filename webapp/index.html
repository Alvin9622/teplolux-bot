<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Teplolux</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;
  --border:#21262d;--text:#e6edf3;--hint:#8b949e;
  --link:#58a6ff;--btn:#1f6feb;--btn-txt:#fff;
  --green:#3fb950;--yellow:#f0b429;--red:#f85149;--purple:#bc8cff;--orange:#e3843a;
  --r:12px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  font-size:14px;min-height:100vh;overflow-x:hidden;}

/* ── NAV ── */
.nav{
  display:flex;background:var(--bg2);border-bottom:1px solid var(--border);
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 4px 8px;cursor:pointer;color:var(--hint);
  font-size:10px;gap:3px;transition:color .2s;border:none;background:none;
}
.nav-item.active{color:var(--link);}
.nav-icon{font-size:22px;line-height:1;}

/* ── PAGES ── */
.page{display:none;padding:16px 16px 80px;min-height:100vh;}
.page.active{display:block;}

/* ── HEADER ── */
.page-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:18px;
}
.page-title{font-size:20px;font-weight:700;}
.refresh-btn{
  width:34px;height:34px;border-radius:50%;background:var(--bg3);
  border:1px solid var(--border);display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:16px;color:var(--hint);
  transition:all .2s;
}
.refresh-btn:active{background:var(--border);}
.spin{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── CARDS ── */
.card{
  background:var(--bg2);border-radius:var(--r);
  border:1px solid var(--border);margin-bottom:12px;overflow:hidden;
}
.card-head{
  padding:14px 16px 10px;display:flex;align-items:center;
  justify-content:space-between;
}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--hint);font-weight:600;}
.card-body{padding:0 16px 16px;}

/* ── STAT GRID ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-box{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:16px 14px;display:flex;flex-direction:column;gap:4px;
}
.stat-num{font-size:30px;font-weight:700;line-height:1;}
.stat-lbl{font-size:11px;color:var(--hint);}
.stat-box.accent{border-color:rgba(88,166,255,.3);background:rgba(88,166,255,.05);}

/* ── PROGRESS ── */
.prog-wrap{margin-bottom:10px;}
.prog-head{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;}
.prog-lbl{font-weight:500;}
.prog-pct{color:var(--hint);}
.prog-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1);}

/* ── LIST ITEMS ── */
.list-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:13px 16px;border-bottom:1px solid var(--border);
}
.list-item:last-child{border:none;}
.item-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.item-body{flex:1;min-width:0;}
.item-title{
  font-size:14px;font-weight:500;margin-bottom:4px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.item-meta{font-size:11px;color:var(--hint);display:flex;flex-wrap:wrap;gap:6px;align-items:center;}

/* ── BADGES ── */
.badge{
  display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;
  font-size:10px;font-weight:600;letter-spacing:.3px;white-space:nowrap;
}
.b-green {background:rgba(63,185,80,.15);color:var(--green);}
.b-yellow{background:rgba(240,180,41,.15);color:var(--yellow);}
.b-red   {background:rgba(248,81,73,.15); color:var(--red);}
.b-blue  {background:rgba(88,166,255,.15);color:var(--link);}
.b-purple{background:rgba(188,140,255,.15);color:var(--purple);}
.b-gray  {background:var(--bg3);color:var(--hint);}

/* ── SEARCH ── */
.search-box{
  position:relative;margin-bottom:12px;
}
.search-input{
  width:100%;padding:11px 14px 11px 40px;background:var(--bg2);
  border:1px solid var(--border);border-radius:10px;color:var(--text);
  font-size:14px;outline:none;transition:border .2s;
}
.search-input:focus{border-color:var(--link);}
.search-ico{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  color:var(--hint);font-size:16px;pointer-events:none;
}

/* ── CHIPS ── */
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{
  flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);
  background:var(--bg2);color:var(--hint);cursor:pointer;font-size:12px;
  white-space:nowrap;transition:all .2s;
}
.chip.active{background:var(--btn);color:var(--btn-txt);border-color:var(--btn);}

/* ── CHART CONTAINER ── */
.chart-wrap{padding:0 16px 16px;position:relative;}
.chart-canvas{width:100%!important;}

/* ── EMPTY / LOADING ── */
.empty,.loading{
  text-align:center;padding:50px 20px;color:var(--hint);
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.empty-ico{font-size:44px;}
.skeleton{
  background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;
  border-radius:6px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── BUDGET CIRCLE ── */
.budget-circle{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;position:relative;
}
.budget-donut{position:relative;width:160px;height:160px;margin:0 auto 16px;}
.donut-center{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.donut-pct{font-size:28px;font-weight:700;}
.donut-lbl{font-size:11px;color:var(--hint);}

/* ── LEADERBOARD ── */
.leader-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-bottom:1px solid var(--border);
}
.leader-item:last-child{border:none;}
.leader-rank{
  width:28px;height:28px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-weight:700;font-size:13px;
  flex-shrink:0;
}
.rank-1{background:rgba(240,180,41,.2);color:var(--yellow);}
.rank-2{background:rgba(88,166,255,.15);color:var(--link);}
.rank-3{background:rgba(188,140,255,.15);color:var(--purple);}
.rank-n{background:var(--bg3);color:var(--hint);}
.leader-name{flex:1;font-weight:500;}
.leader-done{font-size:13px;font-weight:600;color:var(--green);}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:4px 0;}

/* ── SECTION LABEL ── */
.section-lbl{
  font-size:11px;text-transform:uppercase;letter-spacing:.8px;
  color:var(--hint);font-weight:600;padding:16px 0 8px;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#333;color:#fff;padding:10px 20px;border-radius:20px;
  font-size:13px;opacity:0;transition:all .3s;z-index:200;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- PAGES -->
<div id="pg-home"     class="page active"></div>
<div id="pg-tasks"    class="page"></div>
<div id="pg-roadmap"  class="page"></div>
<div id="pg-expenses" class="page"></div>
<div id="pg-stats"    class="page"></div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="nav-item active" onclick="go('home')"    >
    <span class="nav-icon">🏠</span>Bosh sahifa
  </button>
  <button class="nav-item" onclick="go('tasks')"   >
    <span class="nav-icon">📋</span>Vazifalar
  </button>
  <button class="nav-item" onclick="go('roadmap')" >
    <span class="nav-icon">🗺</span>Yo'l xarita
  </button>
  <button class="nav-item" onclick="go('expenses')">
    <span class="nav-icon">💰</span>Xarajatlar
  </button>
  <button class="nav-item" onclick="go('stats')"   >
    <span class="nav-icon">📈</span>Statistika
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
if (tg.themeParams.bg_color) {
  document.documentElement.style.setProperty('--bg', tg.themeParams.bg_color);
  document.documentElement.style.setProperty('--bg2', tg.themeParams.secondary_bg_color || '#161b22');
  document.documentElement.style.setProperty('--text', tg.themeParams.text_color || '#e6edf3');
  document.documentElement.style.setProperty('--hint', tg.themeParams.hint_color || '#8b949e');
  document.documentElement.style.setProperty('--link', tg.themeParams.link_color || '#58a6ff');
  document.documentElement.style.setProperty('--btn', tg.themeParams.button_color || '#1f6feb');
}
const INIT = tg.initData || '';
const CHARTS = {};
let allTasks=[], allExps=[], taskFilter='all', expFilter='all';

/* ── API ── */
async function api(path) {
  const r = await fetch(path, {headers:{'X-Init-Data':INIT}});
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

/* ── HELPERS ── */
const STATUS_ICON = {
  new:'🆕',in_progress:'🔄',done:'✅',cancelled:'❌',review:'👀',
  pending:'⏳',approved:'✅',rejected:'❌',postponed:'🔄',paid:'💳'
};
const STATUS_BADGE = {
  new:'b-blue',in_progress:'b-yellow',done:'b-green',cancelled:'b-red',review:'b-purple',
  pending:'b-yellow',approved:'b-green',rejected:'b-red',postponed:'b-purple',paid:'b-green'
};
const STATUS_NAME = {
  new:"Yangi",in_progress:"Jarayonda",done:"Bajarildi",cancelled:"Bekor",review:"Tekshiruvda",
  pending:"Kutilmoqda",approved:"Tasdiqlangan",rejected:"Rad etilgan",postponed:"Kechiktirilgan",paid:"To'langan"
};
const PRI_COLOR = {high:'var(--red)',medium:'var(--yellow)',low:'var(--green)'};
const MONTHS = ['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentabr','Oktabr','Noyabr','Dekabr'];
const PHASE_COLORS = {'1-3':'var(--green)','4-6':'var(--yellow)','7-9':'var(--link)','10-18':'var(--purple)'};

function badge(status) {
  return `<span class="badge ${STATUS_BADGE[status]||'b-gray'}">${STATUS_NAME[status]||status}</span>`;
}
function progBar(done,total,color='var(--link)') {
  const pct = total ? Math.round(done/total*100) : 0;
  return `<div class="prog-wrap">
    <div class="prog-head"><span class="prog-lbl">${done}/${total}</span><span class="prog-pct">${pct}%</span></div>
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}
function loading(id) {
  document.getElementById(id).innerHTML = `
    <div class="loading"><div style="font-size:32px;animation:spin .8s linear infinite">⟳</div><div>Yuklanmoqda...</div></div>`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

/* ══════════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════════ */
const loaded = {};
function go(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id===`pg-${name}`));
  document.querySelectorAll('.nav-item').forEach((b,i)=>
    b.classList.toggle('active',['home','tasks','roadmap','expenses','stats'][i]===name));
  if (!loaded[name]) { loaded[name]=true; pages[name](); }
}
const pages = {
  home:     loadHome,
  tasks:    loadTasks,
  roadmap:  loadRoadmap,
  expenses: loadExpenses,
  stats:    loadStats,
};

/* ══════════════════════════════════════════════════════
   HOME
══════════════════════════════════════════════════════ */
async function loadHome() {
  const el = document.getElementById('pg-home');
  el.innerHTML = `<div class="page-header">
    <span class="page-title">Dashboard</span>
    <button class="refresh-btn" onclick="reloadHome()" title="Yangilash">⟳</button>
  </div><div id="home-body"><div class="loading"><div style="font-size:32px;animation:spin .8s linear infinite">⟳</div></div></div>`;
  await renderHome();
}
async function reloadHome() {
  const btn = document.querySelector('#pg-home .refresh-btn');
  if(btn) btn.querySelector(':scope').classList?.add('spin') || (btn.style.animation='spin .7s linear infinite');
  document.getElementById('home-body').innerHTML = '<div class="loading"><div style="font-size:32px;animation:spin .8s linear infinite">⟳</div></div>';
  await renderHome();
  if(btn) btn.style.animation='';
}
async function renderHome() {
  try {
    const d = await api('/api/dashboard');
    let html = '';
    if (d.role === 'admin') {
      html += `<div class="stat-grid">
        <div class="stat-box"><div class="stat-num" style="color:var(--yellow)">${d.pending_tasks}</div><div class="stat-lbl">Kutilayotgan vazifalar</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--red)">${d.overdue_tasks}</div><div class="stat-lbl">Muddati o'tgan</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--link)">${d.pending_expenses}</div><div class="stat-lbl">Tasdiq kutayotgan</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--green)">${Object.values(d.phase_progress).reduce((s,p)=>s+p.done,0)}</div><div class="stat-lbl">Bajarilgan (xarita)</div></div>
      </div>`;
      html += `<div class="card"><div class="card-head"><span class="card-title">Yo'l xarita jarayoni</span></div><div class="card-body">`;
      let td=0,tt=0;
      for(const[ph,pp] of Object.entries(d.phase_progress)){
        td+=pp.done;tt+=pp.total;
        const labels={'1-3':'1–3 oy','4-6':'4–6 oy','7-9':'7–9 oy','10-18':'10–18 oy'};
        html+=`<div class="prog-wrap">
          <div class="prog-head"><span class="prog-lbl" style="color:${PHASE_COLORS[ph]}">${labels[ph]}</span><span class="prog-pct">${pp.done}/${pp.total}</span></div>
          <div class="prog-track"><div class="prog-fill" style="width:${pp.total?Math.round(pp.done/pp.total*100):0}%;background:${PHASE_COLORS[ph]}"></div></div>
        </div>`;
      }
      const gp=tt?Math.round(td/tt*100):0;
      html+=`<div style="padding-top:10px;border-top:1px solid var(--border);margin-top:4px">
        <div class="prog-head"><strong>Umumiy progress</strong><span class="prog-pct">${td}/${tt} (${gp}%)</span></div>
        <div class="prog-track"><div class="prog-fill" style="width:${gp}%;background:linear-gradient(90deg,var(--green),var(--purple))"></div></div>
      </div></div></div>`;
      // Donut chart for task status
      html+=`<div class="card"><div class="card-head"><span class="card-title">Yo'l xarita holati</span></div>
        <div class="chart-wrap" style="height:220px"><canvas id="ch-donut" class="chart-canvas"></canvas></div></div>`;
    } else {
      const tc=d.task_counts||{},ec=d.exp_counts||{};
      html+=`<div class="stat-grid">
        <div class="stat-box"><div class="stat-num" style="color:var(--link)">${tc.new||0}</div><div class="stat-lbl">Yangi vazifalar</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--yellow)">${tc.in_progress||0}</div><div class="stat-lbl">Jarayonda</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--purple)">${tc.review||0}</div><div class="stat-lbl">Tekshiruvda</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--green)">${tc.done||0}</div><div class="stat-lbl">Bajarildi</div></div>
      </div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-num" style="color:var(--yellow)">${ec.pending||0}</div><div class="stat-lbl">Kutilayotgan xarajatlar</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--green)">${(ec.approved||0)+(ec.paid||0)}</div><div class="stat-lbl">Tasdiqlangan</div></div>
      </div>`;
    }
    document.getElementById('home-body').innerHTML = html;
    if(d.role==='admin' && d.phase_progress) {
      const pp=d.phase_progress;
      const total=Object.values(pp).reduce((s,p)=>s+p.total,0);
      const done=Object.values(pp).reduce((s,p)=>s+p.done,0);
      const pending=total-done;
      renderDonut('ch-donut',[done,pending],['Bajarildi','Qoldi'],['#3fb950','#21262d']);
    }
  } catch(e) {
    document.getElementById('home-body').innerHTML=`<div class="empty"><div class="empty-ico">⚠️</div><div>${e.message}</div></div>`;
  }
}

/* ══════════════════════════════════════════════════════
   TASKS
══════════════════════════════════════════════════════ */
function buildTasksPage() {
  document.getElementById('pg-tasks').innerHTML = `
    <div class="page-header">
      <span class="page-title">Vazifalar</span>
      <button class="refresh-btn" onclick="reloadTasks()">⟳</button>
    </div>
    <div class="search-box"><span class="search-ico">🔍</span>
      <input class="search-input" id="task-q" placeholder="Qidiruv..." oninput="renderTaskList()">
    </div>
    <div class="chips" id="task-chips">
      <div class="chip active" onclick="setTaskF('all',this)">Barchasi</div>
      <div class="chip" onclick="setTaskF('new',this)">🆕 Yangi</div>
      <div class="chip" onclick="setTaskF('in_progress',this)">🔄 Jarayonda</div>
      <div class="chip" onclick="setTaskF('review',this)">👀 Tekshiruvda</div>
      <div class="chip" onclick="setTaskF('done',this)">✅ Bajarildi</div>
      <div class="chip" onclick="setTaskF('cancelled',this)">❌ Bekor</div>
    </div>
    <div id="task-list" class="card"></div>`;
}
async function loadTasks() {
  buildTasksPage();
  await fetchTasks();
}
async function fetchTasks() {
  document.getElementById('task-list').innerHTML='<div class="loading"><div style="font-size:28px;animation:spin .8s linear infinite">⟳</div></div>';
  try {
    const d=await api('/api/tasks');
    allTasks=d.tasks||[];
    renderTaskList();
  } catch(e) {
    document.getElementById('task-list').innerHTML=`<div class="empty"><div class="empty-ico">⚠️</div><div>${e.message}</div></div>`;
  }
}
async function reloadTasks(){await fetchTasks();showToast('Yangilandi ✓');}
function setTaskF(s,el){
  taskFilter=s;
  document.querySelectorAll('#task-chips .chip').forEach(c=>c.classList.toggle('active',c===el));
  renderTaskList();
}
function renderTaskList() {
  const q=(document.getElementById('task-q')?.value||'').toLowerCase();
  let t=allTasks;
  if(taskFilter!=='all') t=t.filter(x=>x.status===taskFilter);
  if(q) t=t.filter(x=>x.title.toLowerCase().includes(q)||(x.assignee||'').toLowerCase().includes(q));
  if(!t.length){
    document.getElementById('task-list').innerHTML='<div class="empty"><div class="empty-ico">📋</div><div>Vazifalar topilmadi</div></div>';
    return;
  }
  document.getElementById('task-list').innerHTML = t.map(x=>{
    const dl=x.deadline?`📅 ${x.deadline.slice(5).replace('-','.')}`:'';
    const prog=x.progress>0?`<div class="prog-track" style="margin-top:6px"><div class="prog-fill" style="width:${x.progress}%;background:var(--link)"></div></div>`:'';
    return `<div class="list-item">
      <div class="item-icon">${STATUS_ICON[x.status]||'📌'}</div>
      <div class="item-body">
        <div class="item-title">${x.title}</div>
        <div class="item-meta">
          ${badge(x.status)}
          ${x.assignee?`<span>👤 ${x.assignee}</span>`:''}
          ${dl?`<span>${dl}</span>`:''}
          ${x.category?`<span style="color:var(--hint)">${x.category}</span>`:''}
          <span style="color:${PRI_COLOR[x.priority]||'var(--hint)'}">● ${x.priority}</span>
        </div>${prog}
      </div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════════════════════
   ROADMAP
══════════════════════════════════════════════════════ */
async function loadRoadmap() {
  const el=document.getElementById('pg-roadmap');
  el.innerHTML=`<div class="page-header"><span class="page-title">Yo'l xarita</span>
    <button class="refresh-btn" onclick="reloadRoadmap()">⟳</button></div>
    <div id="rm-body"><div class="loading"><div style="font-size:32px;animation:spin .8s linear infinite">⟳</div></div></div>`;
  await renderRoadmap();
}
async function reloadRoadmap(){
  document.getElementById('rm-body').innerHTML='<div class="loading"><div style="font-size:32px;animation:spin .8s linear infinite">⟳</div></div>';
  await renderRoadmap();showToast('Yangilandi ✓');
}
async function renderRoadmap() {
  try{
    const d=await api('/api/roadmap');
    const phases=d.phases||{};
    const order=['1-3','4-6','7-9','10-18'];
    const names={'1-3':'Bosqich 1–3 oy','4-6':'Bosqich 4–6 oy','7-9':'Bosqich 7–9 oy','10-18':'Bosqich 10–18 oy'};
    let gd=0,gt=0,html='';
    for(const ph of order){
      const tasks=phases[ph]||[];
      const done=tasks.filter(t=>t.status==='done').length;
      const tot=tasks.length;
      gd+=done;gt+=tot;
      const pct=tot?Math.round(done/tot*100):0;
      html+=`<div class="card">
        <div class="card-head">
          <span class="card-title" style="color:${PHASE_COLORS[ph]}">${names[ph]}</span>
          <span style="font-size:12px;color:var(--hint)">${done}/${tot} · ${pct}%</span>
        </div>
        <div style="padding:0 16px 8px">
          <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${PHASE_COLORS[ph]}"></div></div>
        </div>`;
      html+=tasks.map(t=>{
        const done_=t.status==='done';
        const meta=[t.deadline?`📅 ${t.deadline}`:'',t.assignee_name?`👤 ${t.assignee_name}`:''].filter(Boolean).join(' · ');
        return `<div class="list-item">
          <div class="item-icon" style="font-size:16px">${done_?'✅':'⬜'}</div>
          <div class="item-body">
            <div class="item-title" style="${done_?'opacity:.5;text-decoration:line-through':''}">${t.title}</div>
            ${meta?`<div class="item-meta">${meta}</div>`:''}
          </div>
        </div>`;
      }).join('');
      html+=`</div>`;
    }
    const gp=gt?Math.round(gd/gt*100):0;
    document.getElementById('rm-body').innerHTML=
      `<div class="card" style="background:linear-gradient(135deg,rgba(63,185,80,.1),rgba(88,166,255,.1))">
        <div class="card-head"><span class="card-title">Umumiy progress</span></div>
        <div class="card-body">
          <div class="prog-head"><span style="font-size:22px;font-weight:700">${gp}%</span><span class="prog-pct">${gd}/${gt} vazifa</span></div>
          <div class="prog-track" style="height:10px;margin-top:8px">
            <div class="prog-fill" style="width:${gp}%;background:linear-gradient(90deg,var(--green),var(--purple))"></div>
          </div>
        </div>
      </div>`+html;
  }catch(e){
    document.getElementById('rm-body').innerHTML=`<div class="empty"><div class="empty-ico">⚠️</div><div>${e.message}</div></div>`;
  }
}

/* ══════════════════════════════════════════════════════
   EXPENSES
══════════════════════════════════════════════════════ */
function buildExpPage(){
  document.getElementById('pg-expenses').innerHTML=`
    <div class="page-header"><span class="page-title">Xarajatlar</span>
      <button class="refresh-btn" onclick="reloadExp()">⟳</button></div>
    <div class="chips" id="exp-chips">
      <div class="chip active" onclick="setExpF('all',this)">Barchasi</div>
      <div class="chip" onclick="setExpF('pending',this)">⏳ Kutilmoqda</div>
      <div class="chip" onclick="setExpF('approved',this)">✅ Tasdiqlangan</div>
      <div class="chip" onclick="setExpF('paid',this)">💳 To'langan</div>
      <div class="chip" onclick="setExpF('rejected',this)">❌ Rad etilgan</div>
    </div>
    <div id="exp-summary"></div>
    <div id="exp-list" class="card"></div>`;
}
async function loadExpenses(){buildExpPage();await fetchExp();}
async function fetchExp(){
  document.getElementById('exp-list').innerHTML='<div class="loading"><div style="font-size:28px;animation:spin .8s linear infinite">⟳</div></div>';
  try{
    const d=await api('/api/expenses');
    allExps=d.expenses||[];
    renderExp();
  }catch(e){
    document.getElementById('exp-list').innerHTML=`<div class="empty"><div class="empty-ico">⚠️</div><div>${e.message}</div></div>`;
  }
}
async function reloadExp(){await fetchExp();showToast('Yangilandi ✓');}
function setExpF(s,el){
  expFilter=s;
  document.querySelectorAll('#exp-chips .chip').forEach(c=>c.classList.toggle('active',c===el));
  renderExp();
}
function renderExp(){
  let exps=allExps;
  if(expFilter!=='all') exps=exps.filter(e=>e.status===expFilter);
  // Summary totals for approved+paid
  const totals={};
  allExps.filter(e=>['approved','paid'].includes(e.status)).forEach(e=>{
    totals[e.currency]=(totals[e.currency]||0)+e.amount;
  });
  const keys=Object.keys(totals).filter(c=>totals[c]>0);
  document.getElementById('exp-summary').innerHTML = keys.length?
    `<div class="card" style="margin-bottom:12px">
      <div class="card-head"><span class="card-title">Tasdiqlangan jami</span></div>
      <div class="card-body">
        ${keys.map(c=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)">
          <span style="color:var(--hint)">${c}</span>
          <strong style="color:var(--green)">${totals[c].toLocaleString()} ${c}</strong>
        </div>`).join('')}
      </div>
    </div>`:'' ;
  if(!exps.length){
    document.getElementById('exp-list').innerHTML='<div class="empty"><div class="empty-ico">💰</div><div>Xarajatlar topilmadi</div></div>';
    return;
  }
  document.getElementById('exp-list').innerHTML=exps.map(e=>{
    const dl=e.deadline?`📅 ${e.deadline}`:'';
    return `<div class="list-item">
      <div class="item-icon">${STATUS_ICON[e.status]||'💰'}</div>
      <div class="item-body">
        <div class="item-title">${e.name}</div>
        <div class="item-meta">
          ${badge(e.status)}
          <span style="font-weight:600;color:var(--text)">${e.amount.toLocaleString()} ${e.currency}</span>
          ${e.created_at?`<span>${e.created_at}</span>`:''}
          ${dl?`<span>${dl}</span>`:''}
        </div>
        ${e.note?`<div style="font-size:11px;color:var(--hint);margin-top:3px;font-style:italic">${e.note}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════════════════════
   STATS
══════════════════════════════════════════════════════ */
async function loadStats(){
  const el=document.getElementById('pg-stats');
  el.innerHTML=`<div class="page-header"><span class="page-title">Statistika</span>
    <button class="refresh-btn" onclick="reloadStats()">⟳</button></div>
    <div id="stats-body"><div class="loading"><div style="font-size:32px;animation:spin .8s linear infinite">⟳</div></div></div>`;
  await renderStats();
}
async function reloadStats(){
  document.getElementById('stats-body').innerHTML='<div class="loading"><div style="font-size:32px;animation:spin .8s linear infinite">⟳</div></div>';
  Object.keys(CHARTS).forEach(k=>{try{CHARTS[k].destroy();delete CHARTS[k];}catch(e){}});
  await renderStats();showToast('Yangilandi ✓');
}
async function renderStats(){
  try{
    const[s,b]=await Promise.all([api('/api/stats'),api('/api/budget').catch(()=>null)]);
    let html='';

    /* Leaderboard */
    if(s.leaderboard?.length){
      html+=`<div class="card"><div class="card-head"><span class="card-title">Lider jadval</span></div>`;
      s.leaderboard.forEach((u,i)=>{
        const rankCls=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n';
        const pct=u.total?Math.round(u.done/u.total*100):0;
        html+=`<div class="leader-item">
          <div class="leader-rank ${rankCls}">${i+1}</div>
          <div class="leader-name">${u.name}</div>
          <div style="text-align:right">
            <div class="leader-done">${u.done} ✅</div>
            <div style="font-size:10px;color:var(--hint)">${pct}%</div>
          </div>
        </div>`;
      });
      html+=`</div>`;
    }

    /* Expense status chart */
    const es=s.expense_stats;
    if(es?.status_counts && Object.keys(es.status_counts).length){
      html+=`<div class="card"><div class="card-head"><span class="card-title">Xarajat holati (bu oy)</span></div>
        <div class="chart-wrap" style="height:240px"><canvas id="ch-exp-status"></canvas></div></div>`;
    }

    /* Budget chart */
    if(b?.months?.length){
      html+=`<div class="card"><div class="card-head"><span class="card-title">USD xarajat tarixi</span></div>
        <div class="chart-wrap" style="height:220px"><canvas id="ch-budget"></canvas></div></div>`;
    }

    /* Currency bar chart */
    if(es?.currency_totals){
      const ct=es.currency_totals;
      const nonZero=Object.entries(ct).filter(([,v])=>v>0);
      if(nonZero.length){
        html+=`<div class="card"><div class="card-head"><span class="card-title">Tasdiqlangan valyuta bo'yicha</span></div>
          <div class="card-body">
            ${nonZero.map(([c,v])=>`<div class="prog-wrap">
              <div class="prog-head"><span>${c}</span><span style="font-weight:600">${v.toLocaleString()}</span></div>
              <div class="prog-track"><div class="prog-fill" style="width:100%;background:var(--link)"></div></div>
            </div>`).join('')}
          </div></div>`;
      }
    }

    /* Top 3 */
    if(es?.top3?.length){
      html+=`<div class="card"><div class="card-head"><span class="card-title">Top xarajatlar (bu oy)</span></div>`;
      es.top3.forEach((t,i)=>{
        const icons=['🥇','🥈','🥉'];
        html+=`<div class="list-item">
          <div class="item-icon">${icons[i]||'💰'}</div>
          <div class="item-body">
            <div class="item-title">${t.name}</div>
            <div class="item-meta"><strong style="color:var(--green)">${(t.total||0).toLocaleString()}</strong></div>
          </div>
        </div>`;
      });
      html+=`</div>`;
    }

    document.getElementById('stats-body').innerHTML = html||'<div class="empty"><div class="empty-ico">📊</div><div>Ma\'lumot yo\'q</div></div>';

    /* Render charts */
    if(es?.status_counts){
      const sc=es.status_counts;
      const labels=Object.keys(sc).map(k=>STATUS_NAME[k]||k);
      const data=Object.values(sc);
      const colors=['#f0b429','#3fb950','#f85149','#58a6ff','#bc8cff','#8b949e'];
      renderDonut('ch-exp-status',data,labels,colors);
    }
    if(b?.months?.length){
      const months=b.months.reverse();
      renderLine('ch-budget',
        months.map(m=>`${MONTHS[m.month-1].slice(0,3)} ${m.year}`),
        [{label:'Sarflandi',data:months.map(m=>m.spent.USD||0),color:'#58a6ff'},
         {label:'Limit',data:months.map(m=>m.limits.USD||0),color:'#f0b429',dashed:true}]
      );
    }
  }catch(e){
    document.getElementById('stats-body').innerHTML=`<div class="empty"><div class="empty-ico">⚠️</div><div>${e.message}</div></div>`;
  }
}

/* ══════════════════════════════════════════════════════
   CHART HELPERS
══════════════════════════════════════════════════════ */
const CHART_DEFAULTS = {
  responsive:true,maintainAspectRatio:false,
  plugins:{legend:{labels:{color:'#8b949e',boxWidth:10,padding:12}}},
};
function renderDonut(id,data,labels,colors){
  const ctx=document.getElementById(id);if(!ctx)return;
  if(CHARTS[id])CHARTS[id].destroy();
  CHARTS[id]=new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:0,hoverOffset:4}]},
    options:{...CHART_DEFAULTS,cutout:'65%',plugins:{legend:{position:'bottom',labels:{color:'#8b949e',boxWidth:10,padding:14}}}}});
}
function renderLine(id,labels,datasets){
  const ctx=document.getElementById(id);if(!ctx)return;
  if(CHARTS[id])CHARTS[id].destroy();
  CHARTS[id]=new Chart(ctx,{type:'line',data:{labels,datasets:datasets.map(d=>({
    label:d.label,data:d.data,borderColor:d.color,backgroundColor:d.color+'22',
    borderWidth:2,pointRadius:4,fill:!d.dashed,tension:.4,
    borderDash:d.dashed?[6,3]:undefined,
  }))},options:{...CHART_DEFAULTS,scales:{
    x:{ticks:{color:'#8b949e',maxRotation:0},grid:{color:'#21262d'}},
    y:{ticks:{color:'#8b949e'},grid:{color:'#21262d'},beginAtZero:true}
  }}});
}
