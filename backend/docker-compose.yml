# ============================================================================
# Teplolux AI CRM Assistant — local / staging orchestration
# ----------------------------------------------------------------------------
# Brings up the backend together with PostgreSQL and Redis, with healthchecks,
# named volumes and dependency ordering.
# ============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: teplolux-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-teplolux}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teplolux}
      POSTGRES_DB: ${POSTGRES_DB:-teplolux_crm}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-teplolux} -d ${POSTGRES_DB:-teplolux_crm}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - teplolux-net

  redis:
    image: redis:7-alpine
    container_name: teplolux-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - teplolux-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teplolux-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Inside the compose network, reach the services by their names.
      DATABASE_URL: postgresql://${POSTGRES_USER:-teplolux}:${POSTGRES_PASSWORD:-teplolux}@postgres:5432/${POSTGRES_DB:-teplolux_crm}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      PORT: '3000'
    ports:
      - '${PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend-logs:/app/logs
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - teplolux-net

volumes:
  postgres-data:
  redis-data:
  backend-logs:

networks:
  teplolux-net:
    driver: bridge
